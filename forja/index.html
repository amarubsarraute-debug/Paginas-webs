<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#121317" />
  <title>FORJA — Día X de 90</title>
  <!-- Fuentes 100% locales: la app funciona sin internet (abre offline a las 6am) -->
  <link rel="stylesheet" href="css/fonts.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- Grano de fondo -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Contenedor de pantallas -->
  <main id="app"></main>

  <!-- Navegación inferior -->
  <nav id="nav" class="nav" aria-label="Navegación">
    <button class="nav__btn is-active" data-route="hoy">
      <span class="nav__label">HOY</span>
    </button>
    <button class="nav__btn" data-route="creencias">
      <span class="nav__label">CREENCIAS</span>
    </button>
    <button class="nav__btn" data-route="dias">
      <span class="nav__label">90</span>
    </button>
    <button class="nav__btn" data-route="emociones">
      <span class="nav__label">EMOCIÓN</span>
    </button>
    <button class="nav__btn" data-route="yaesta">
      <span class="nav__label">YA ESTÁ</span>
    </button>
    <button class="nav__btn" data-route="decision">
      <span class="nav__label">DECISIÓN</span>
    </button>
    <button class="nav__btn nav__btn--gear" data-route="ajustes" aria-label="Ajustes">
      <span class="nav__label">⚙</span>
    </button>
  </nav>

  <!-- Capa de overlays (modales: self-talk, etc.) -->
  <div id="overlay" class="overlay" hidden></div>

  <script src="js/data.js"></script>
  <script src="js/db.js"></script>
  <script src="js/state.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/ui2.js"></script>
  <script src="js/voz.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
